server.port := 8088
server.username := ""
server.groupname := ""

$HTTP["host"] =~ "^(.+):8088$" {
    url.redirect = ( "^/xkeen/" => "http://%1:91" )
    url.redirect-code = 301
}

$SERVER["socket"] == ":91" {
    cgi.assign += ( ".php" => "/usr/bin/php-cgi" )
    static-file.exclude-extensions += (".php")
    setenv.set-environment = ( "PATH" => "/usr/sbin:/usr/bin:/sbin:/bin" )
    index-file.names = ( "index.html" )
    server.error-handler-404 = "/xkeen/index.html"
    url.rewrite-once = ( "^/(.*)" => "/xkeen/$1" )
}
